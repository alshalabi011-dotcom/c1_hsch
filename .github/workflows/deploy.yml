name: Deploy Android App to Supabase

on:
  push:
    branches:
      - main
  workflow_dispatch: # يسمح بتشغيل الأتمتة يدوياً من موقع GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. إعداد لغة الجافا المطلوبة لبناء الأندرويد
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. تثبيت وإعداد بيئة عمل Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. تنزيل الملحقات والحزم
      - name: Install dependencies
        run: flutter pub get

      # 5. توليد ملفات الترجمة والملحقات التلقائية
      - name: Generate Localizations
        run: flutter gen-l10n

      # 6. بناء ملف الـ APK النهائي
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # 7. قراءة معلومات النسخة من pubspec.yaml وتجهيز ملف version.json
      - name: Generate version.json
        run: |
          VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //')
          VERSION_NAME=$(echo $VERSION | cut -d'+' -f1)
          BUILD_NUMBER=$(echo $VERSION | cut -d'+' -f2)
          
          # استخراج رسالة آخر commit لاستخدامها كملاحظات الإصدار
          COMMIT_MSG=$(git log -1 --pretty=%B | head -n 3)
          
          cat <<EOF > version.json
          {
            "version": "$VERSION_NAME",
            "build_number": $BUILD_NUMBER,
            "apk_url": "https://qoiyvojzqhbabnncfcjo.supabase.co/storage/v1/object/public/app-updates/C1%20Hsch.apk",
            "release_notes": "• تم البناء تلقائياً عبر GitHub Actions.\n• آخر التغييرات:\n$COMMIT_MSG",
            "force_update": false
          }
          EOF
          echo "Generated version.json successfully."
          cat version.json

      # 8. رفع الملفات إلى Supabase Storage باستخدام API الخاص بسوبابيز
      - name: Upload APK & JSON to Supabase
        run: |
          # رفع ملف الـ APK
          curl -X PUT \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "x-upsert: true" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@build/app/outputs/flutter-apk/app-release.apk" \
            "https://qoiyvojzqhbabnncfcjo.supabase.co/storage/v1/object/app-updates/C1%20Hsch.apk"
          
          # رفع ملف الـ version.json
          curl -X PUT \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "x-upsert: true" \
            -H "Content-Type: application/json" \
            --data-binary "@version.json" \
            "https://qoiyvojzqhbabnncfcjo.supabase.co/storage/v1/object/app-updates/version.json"
          
          echo "Deployment completed successfully!"
