name: c1_hsch
description: "C1 Hsch — Arabic-language learning app for German C1 exam preparation."
publish_to: 'none'

version: 1.1.0+4

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  go_router: ^13.2.0
  flutter_launcher_icons: ^0.14.4
  shared_preferences: ^2.5.5
  http: ^1.2.0
  package_info_plus: ^8.0.0
  ota_update: ^7.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  generate: true

  assets:
    - version.json
    - assets/data/
    - assets/data/section_1/
    - assets/data/section_2/
    - assets/icon/

  # No custom fonts — system default (San Francisco / Roboto)
